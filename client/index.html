<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>Hermes Desktop</h1>
          <button id="new-session-btn" class="ghost">New Session</button>
        </div>
        <div class="workspace-card">
          <div class="label">Workspace</div>
          <div id="workspace-path" class="workspace-path">Not selected</div>
          <button id="pick-workspace-btn" class="secondary">Choose Folder</button>
        </div>
        <div class="sessions-header">
          <span>Sessions</span>
          <button id="refresh-sessions-btn" class="ghost">Refresh</button>
        </div>
        <div id="sessions-list" class="sessions-list"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <div id="active-title" class="active-title">No active session</div>
            <div id="status-line" class="status-line">Waiting for Hermes sidecar</div>
          </div>
          <div class="topbar-actions">
            <button id="stop-btn" class="danger">Stop</button>
          </div>
        </header>

        <section id="messages" class="messages"></section>

        <section class="composer">
          <textarea id="prompt-input" placeholder="Ask Hermes to inspect, plan, patch, or run code..."></textarea>
          <div class="composer-actions">
            <button id="send-btn" class="primary">Send</button>
          </div>
        </section>
      </main>

      <aside class="inspector">
        <section class="panel">
          <div class="panel-title">Tool Timeline</div>
          <div id="tool-timeline" class="tool-timeline"></div>
        </section>

        <section class="panel">
          <div class="panel-title">Settings</div>
          <label class="field">
            <span>Model</span>
            <input id="model-input" type="text" />
          </label>
          <label class="field">
            <span>Toolsets (comma separated)</span>
            <input id="toolsets-input" type="text" />
          </label>
          <label class="field">
            <span>Approvals</span>
            <select id="approvals-select">
              <option value="manual">manual</option>
              <option value="smart">smart</option>
              <option value="off">off</option>
            </select>
          </label>
          <label class="field">
            <span>Default cwd</span>
            <input id="cwd-input" type="text" />
          </label>
          <button id="save-settings-btn" class="secondary">Save Settings</button>
        </section>
      </aside>
    </div>

    <div id="modal-backdrop" class="modal-backdrop hidden">
      <div class="modal">
        <div id="modal-title" class="modal-title"></div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-actions" class="modal-actions"></div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
